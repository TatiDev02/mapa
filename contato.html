<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Entre em contato com a equipe do Pink Chess.">
    <meta name="keywords" content="Contato, email, mensagem xadrez">
    <meta name="author" content="Estudante de TI">
    <title>Pink Chess | Contato</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="logo">👑 Pink Chess</div>
        <nav class="menu">
            <a href="index.html">Home</a>
            <a href="sobre.html">Sobre</a>
            <a href="posts.html">Posts</a>
            <a href="contato.html" class="active">Contato</a>
        </nav>
    </header>
    <main class="container">
        <h1>Fale Conosco</h1>
        <p>Tem alguma sugestão de post ou dúvida sobre xadrez? Mande sua mensagem!</p>
        <div id="mensagemStatus" class="status-msg"></div>
        <form id="formContato" class="form-estilizado">
            <div class="campo">
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" placeholder="Digite seu nome completo">
            </div>
            <div class="campo">
                <label for="email">E-mail:</label>
                <input type="text" id="email" name="email" placeholder="Seu melhor e-mail">
            </div>
            <div class="campo">
                <label for="mensagem">Mensagem:</label>
                <textarea id="mensagem" name="mensagem" rows="5" placeholder="Sua mensagem precisa ter pelo menos 10 caracteres..."></textarea>
            </div>
            <button type="submit" class="btn-enviar">Enviar Mensagem</button>
        </form>
    </main>
    <button id="btnTopo" title="Voltar ao Topo">▲</button>
    <footer>
        <p>&copy; 2026 Pink Chess - Desenvolvido para fins acadêmicos.</p>
    </footer>
    <script src="js/script.js"></script>
</body>
</html>
